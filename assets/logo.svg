  <path d="M105 289 Q153 270 193 291" stroke-width="3" opacity=".8"/>
  <path d="M315 289 Q267 270 227 291" stroke-width="3" opacity=".8"/>

  <!-- baston -->
  <path d="M210 100 V274" stroke-width="12"/>
  <path d="M189 107 Q210 83 231 107" stroke-width="8"/>

  <!-- șarpe -->
  <path d="M224 126
           C271 139 270 171 223 184
           C174 197 176 229 225 241
           C258 249 252 270 222 275" stroke-width="10"/>
  <path d="M230 126 Q243 119 252 131" stroke-width="6"/>
  <circle cx="250" cy="132" r="3.6" fill="#f1d98d" stroke="none"/>
</g>
</svg>
