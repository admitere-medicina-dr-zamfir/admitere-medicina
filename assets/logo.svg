<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" role="img" aria-labelledby="title desc">
<title id="title">Admitere Medicină – dr. Zamfir Alexandru</title>
<desc id="desc">Bastonul lui Asclepios deasupra unei cărți deschise, în auriu și albastru închis.</desc>
<defs>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f1d98d"/>
    <stop offset=".55" stop-color="#d6b15f"/>
    <stop offset="1" stop-color="#a9822f"/>
  </linearGradient>
  <radialGradient id="bg" cx=".5" cy=".42" r=".7">
    <stop offset="0" stop-color="#0f315e"/>
    <stop offset="1" stop-color="#06172d"/>
  </radialGradient>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000" flood-opacity=".35"/>
  </filter>
</defs>

<circle cx="210" cy="210" r="190" fill="url(#bg)" stroke="url(#gold)" stroke-width="8"/>
<circle cx="210" cy="210" r="168" fill="none" stroke="#d6b15f" stroke-opacity=".35" stroke-width="2"/>

<g filter="url(#shadow)" fill="none" stroke="url(#gold)" stroke-linecap="round" stroke-linejoin="round">
  <!-- carte -->
